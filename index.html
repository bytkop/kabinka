<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-КАБИНКА.РУ | CONTROL PANEL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #86ff00;
            --bg: #0b0e11;
            --panel: #1a1d21;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* ПРЕЛОАДЕР */
        #loader {
            position: fixed;
            width: 100%; height: 100%;
            background: black;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .sphere-wrap {
            width: 150px; height: 150px;
            border: 2px dashed var(--primary);
            border-radius: 50%;
            animation: rotate 5s linear infinite;
            display: flex; justify-content: center; align-items: center;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ТЕРМИНАЛ ФУЛЛСКРИН */
        #terminal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: black;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        #term-frame { width: 100%; height: 100%; border: none; }

        /* СТИЛЬ ПОСТОВ ВК */
        .post {
            background: var(--panel);
            max-width: 600px; margin: 20px auto;
            border-radius: 12px; padding: 20px;
            border: 1px solid #333;
        }
        .post img { width: 100%; border-radius: 8px; margin: 15px 0; }
        .reactions { display: flex; gap: 10px; }
        .reac-btn { 
            background: #2a2d31; border: none; color: white; 
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
            transition: 0.2s;
        }
        .reac-btn:hover { background: #3f4348; }

        /* Кнопки и прочее */
        .btn-action {
            background: var(--primary); color: black;
            border: none; padding: 12px 25px; border-radius: 8px;
            font-weight: bold; cursor: pointer;
        }
        
        .section { padding: 40px 10%; text-align: center; }
        .toilet-gif { width: 100px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="sphere-wrap">
            <div style="color: var(--primary); font-weight: bold;">3-КАБИНКА</div>
        </div>
        <p style="color: var(--primary); margin-top: 20px; font-family: monospace;">Подождите несколько секунд...</p>
    </div>

    <div style="padding: 20px; display: flex; justify-content: space-around; background: #000;">
        <div style="color: var(--primary); font-weight: 800;">3-КАБИНКА.РУ</div>
        <button class="btn-action" onclick="openTerminal()">ТЕРМИНАЛ</button>
    </div>

    <section class="section">
        <h1>Голосование за отряд</h1>
        <div style="max-width: 300px; margin: 0 auto;">
            <canvas id="voteChart"></canvas>
        </div>
        <p id="stats-text">Загрузка данных...</p>
        <button class="btn-action" onclick="sendVote()">ОТДАТЬ ГОЛОС</button>
    </section>

    <section class="section" style="background: #111;">
        <h2>КОМАНДА</h2>
        <p><b>Лидер:</b> Игнатов Илья</p>
        <p><b>Спонсоры:</b> П. Сергей, М. Денис, К. Богдан</p>
        <p><b>Элита:</b> Б. Иван, О. Георгий</p>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJubGZ4bmh4bmh4bmh4bmh4bmh4bmh4bmh4bmh4bmh4bmh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxP5OqP8p9K/giphy.gif" class="toilet-gif">
    </section>

    <section class="section" id="news-section">
        <h2>НОВОСТИ</h2>
        <div id="posts-container">
            </div>
    </section>

    <div id="terminal-overlay">
        <div style="padding: 10px; background: #222; display: flex; justify-content: space-between;">
            <span>SYSTEM CONTROL UNIT</span>
            <button onclick="closeTerminal()" style="background:red; color:white; border:none; cursor:pointer;">ВЫХОД [X]</button>
        </div>
        <iframe src="terminal.html" id="term-frame"></iframe>
    </div>

    <script>
        // КОНФИГ
        const SERVER_URL = "https://YOUR_NAME.pythonanywhere.com"; // ЗАМЕНИ НА СВОЁ
        
        // 1. Прелоадер
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 3000);
        });

        // 2. Инициализация диаграммы
        const ctx = document.getElementById('voteChart').getContext('2d');
        let myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['ЗА', 'НЕ ПРОСНУЛИСЬ'],
                datasets: [{ data: [0, 100], backgroundColor: ['#86ff00', '#333'] }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });

        // 3. Синхронизация данных (Новости и Голоса)
        async function sync() {
            try {
                const res = await fetch(`${SERVER_URL}/get_all`);
                const data = await res.json();

                // Обновляем график
                myChart.data.datasets[0].data = [data.votes.voted, data.votes.not_voted];
                myChart.update();
                document.getElementById('stats-text').innerText = `Всего голосов: ${data.votes.voted}`;

                // Обновляем посты
                const container = document.getElementById('posts-container');
                container.innerHTML = "";
                data.posts.forEach(post => {
                    container.innerHTML += `
                        <div class="post">
                            <div style="text-align:left; font-size: 0.8rem; color: #888;">Администрация • ID ${post.id}</div>
                            <h3 style="text-align:left; margin: 10px 0;">${post.title}</h3>
                            <p style="text-align:left;">${post.text}</p>
                            ${post.image ? `<img src="${post.image}">` : ''}
                            <div class="reactions">
                                <button class="reac-btn" onclick="sendReact(${post.id}, '🔥')">🔥 ${post.reactions['🔥'] || 0}</button>
                                <button class="reac-btn" onclick="sendReact(${post.id}, '😎')">😎 ${post.reactions['😎'] || 0}</button>
                                <button class="reac-btn" onclick="sendReact(${post.id}, '💩')">💩 ${post.reactions['💩'] || 0}</button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.log("Сервер пока не отвечает...");
            }
        }

        // 4. Функции кнопок
        async function sendVote() {
            const name = prompt("Введите ваше имя:");
            const grade = prompt("Ваш класс:");
            if(name && grade) {
                await fetch(`${SERVER_URL}/vote`, { method: 'POST' });
                alert("Твой голос в системе!");
                sync();
            }
        }

        async function sendReact(postId, emoji) {
            await fetch(`${SERVER_URL}/react`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ post_id: postId, emoji: emoji })
            });
            sync();
        }

        // 5. Полноэкранный терминал
        function openTerminal() {
            const term = document.getElementById('terminal-overlay');
            term.style.display = 'flex';
            document.documentElement.requestFullscreen().catch(() => {});
        }

        function closeTerminal() {
            document.getElementById('terminal-overlay').style.display = 'none';
            if (document.fullscreenElement) document.exitFullscreen();
        }

        // Запуск синхронизации при загрузке
        sync();
        setInterval(sync, 10000); // Обновлять каждые 10 сек
    </script>
</body>
</html>
